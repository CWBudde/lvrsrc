name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build WASM
        run: GOOS=js GOARCH=wasm go build -o web/lvrsrc.wasm ./cmd/lvrsrcwasm

      - name: Copy wasm_exec.js
        run: |
          GOROOT=$(go env GOROOT)
          if [ -f "$GOROOT/misc/wasm/wasm_exec.js" ]; then
            cp "$GOROOT/misc/wasm/wasm_exec.js" web/
          elif [ -f "$GOROOT/lib/wasm/wasm_exec.js" ]; then
            cp "$GOROOT/lib/wasm/wasm_exec.js" web/
          else
            GO_VER=$(go env GOVERSION | sed 's/go//')
            curl -fsSL "https://raw.githubusercontent.com/golang/go/go${GO_VER}/misc/wasm/wasm_exec.js" \
              -o web/wasm_exec.js
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
